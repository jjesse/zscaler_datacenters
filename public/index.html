<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zscaler Datacenter Lookup</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-polylinedecorator@1.6.0/dist/leaflet.polylineDecorator.css" />
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🌐 Zscaler Datacenter Lookup</h1>
            <p class="subtitle">Find which Zscaler datacenter an IP address belongs to</p>
        </header>

        <main>
            <div class="card">
                <form id="lookupForm">
                    <div class="form-group">
                        <label for="cloudSelect">Zscaler Cloud</label>
                        <select id="cloudSelect" required>
                            <option value="">Select a cloud...</option>
                            <option value="zscaler.net">zscaler.net</option>
                            <option value="zscalerone.net">zscalerone.net</option>
                            <option value="zscalertwo.net">zscalertwo.net</option>
                            <option value="zscalerthree.net">zscalerthree.net</option>
                            <option value="zscloud.net">zscloud.net</option>
                            <option value="zscalerbeta.net">zscalerbeta.net</option>
                            <option value="zscalergov.net">zscalergov.net</option>
                            <option value="zscalerten.net">zscalerten.net</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="ipInput">Zscaler IP Address</label>
                        <input 
                            type="text" 
                            id="ipInput" 
                            placeholder="e.g., 165.225.28.50" 
                            pattern="^(\d{1,3}\.){3}\d{1,3}$"
                            required
                        >
                        <small>Enter the Zscaler datacenter IPv4 address to lookup</small>
                    </div>

                    <div class="form-group">
                        <label for="sourceIpInput">Your IP Address <span class="optional">(optional)</span></label>
                        <input 
                            type="text" 
                            id="sourceIpInput" 
                            placeholder="e.g., 203.0.113.45" 
                            pattern="^(\d{1,3}\.){3}\d{1,3}$"
                        >
                        <small>Enter your public IP to show traffic flow on map</small>
                    </div>

                    <button type="submit" class="btn-primary" id="submitBtn">
                        <span class="btn-text">Lookup Datacenter</span>
                        <span class="loader" style="display: none;"></span>
                    </button>
                </form>
            </div>

            <div id="resultContainer" class="result-container" style="display: none;">
                <div class="card result-card">
                    <div class="result-header">
                        <h2>Results</h2>
                        <button class="btn-close" id="closeBtn">&times;</button>
                    </div>
                    <div id="resultContent"></div>
                    <div id="mapContainer" class="map-container" style="display: none;">
                        <h3>Traffic Flow Map</h3>
                        <div id="map"></div>
                    </div>
                </div>
            </div>
        </main>

        <footer>
            <p>Data sourced from <a href="https://config.zscaler.com/" target="_blank">Zscaler Config API</a></p>
            <p class="version">v1.2.0</p>
        </footer>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-polylinedecorator@1.6.0/dist/leaflet.polylineDecorator.js"></script>
    <script src="app.js"></script>
</body>
</html>
