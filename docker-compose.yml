version: '3.8'

services:
  zscaler-lookup:
    build: .
    container_name: zscaler-datacenter-lookup
    ports:
      - "0.0.0.0:3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - CACHE_DURATION=3600000  # 1 hour in milliseconds
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('https').get({hostname:'127.0.0.1',port:3000,path:'/api/health',rejectUnauthorized:false},(r)=>{process.exit(r.statusCode===200?0:1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M
        reservations:
          cpus: '0.10'
          memory: 64M
    networks:
      - zscaler-network

networks:
  zscaler-network:
    driver: bridge
