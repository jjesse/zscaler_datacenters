version: '3.8'

services:
  zscaler-lookup:
    build: .
    container_name: zscaler-datacenter-lookup
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - CACHE_DURATION=3600000  # 1 hour in milliseconds
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - zscaler-network

networks:
  zscaler-network:
    driver: bridge
